name: Métricas SDR — Diário

on:
  schedule:
    # 07:00 BRT (10:00 UTC), segunda a sábado (sexta-feira gera o dado de quinta;
    # sábado gera sexta — pulamos domingo/segunda pra não disparar com dado vazio)
    - cron: '0 10 * * 2-6'
  workflow_dispatch:
    inputs:
      data_inicio:
        description: 'Data início (YYYY-MM-DD) — opcional, default: ontem'
        required: false
      data_fim:
        description: 'Data fim (YYYY-MM-DD) — opcional, default: ontem'
        required: false

permissions:
  contents: write  # necessário para commitar os JSONs de volta

concurrency:
  group: metrics-daily
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Calcular janela (ontem em BRT)
        id: janela
        run: |
          if [ -n "${{ inputs.data_inicio }}" ]; then
            echo "inicio=${{ inputs.data_inicio }}" >> "$GITHUB_OUTPUT"
            echo "fim=${{ inputs.data_fim || inputs.data_inicio }}" >> "$GITHUB_OUTPUT"
          else
            ONTEM=$(TZ='America/Sao_Paulo' date -d 'yesterday' +%Y-%m-%d)
            echo "inicio=$ONTEM" >> "$GITHUB_OUTPUT"
            echo "fim=$ONTEM"    >> "$GITHUB_OUTPUT"
          fi

      - name: Rodar backfill
        env:
          CHATWOOT_TOKEN: ${{ secrets.CHATWOOT_TOKEN }}
          NOCODB_TOKEN:   ${{ secrets.NOCODB_TOKEN }}
        run: node scripts/backfill.mjs "${{ steps.janela.outputs.inicio }}" "${{ steps.janela.outputs.fim }}"

      - name: Commit & push se houve mudança
        run: |
          git config user.name  "metricas-bot"
          git config user.email "metricas-bot@users.noreply.github.com"
          git add dashboard/data/daily.json dashboard/data/weekly.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nos JSONs"
          else
            git commit -m "chore(metrics): diário ${{ steps.janela.outputs.fim }}"
            git push
          fi
